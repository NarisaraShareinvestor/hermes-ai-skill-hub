version: '3.8'

services:
  # PostgreSQL Database - Production
  postgres:
    image: postgres:15-alpine
    container_name: hermes_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-hermes_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-hermes_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - hermes_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hermes_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend - Production
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hermes_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-hermes_user}:${DB_PASSWORD:-change_me_in_production}@postgres:5432/${DB_NAME:-hermes_db}
      BACKEND_URL: https://${DOMAIN_NAME}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      ENVIRONMENT: production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./backend:/app/backend
      - ./backend/uploads:/app/backend/uploads
    ports:
      - "8000:8000"
    networks:
      - hermes_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx - Reverse Proxy & Frontend
  nginx:
    image: nginx:alpine
    container_name: hermes_nginx
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./app.html:/usr/share/nginx/html/app.html:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - nginx_logs:/var/log/nginx
    networks:
      - hermes_network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/app.html"]
      interval: 30s
      timeout: 10s
      retries: 3

  # n8n Workflow Automation - Optional
  n8n:
    image: n8nio/n8n:latest
    container_name: hermes_n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-change_me}
      - N8N_HOST=${DOMAIN_NAME}
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=Asia/Bangkok
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=${DB_USER:-hermes_user}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-change_me_in_production}
      - DB_POSTGRESDB_DATABASE=n8n_db
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - hermes_network
    restart: always
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and queue
  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change_me}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hermes_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hermes_network:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  redis_data:
  nginx_logs:
