version: '3.8'

services:
  # PostgreSQL Database - Production (pgvector = PG15 + vector extension)
  postgres:
    image: pgvector/pgvector:pg15
    container_name: hermes_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-hermes_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-hermes_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - hermes_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hermes_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend - Production
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hermes_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-hermes_user}:${DB_PASSWORD:-change_me_in_production}@postgres:5432/${DB_NAME:-hermes_db}
      BACKEND_URL: https://${DOMAIN_NAME}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      ENVIRONMENT: production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hermes_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change_me_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-hermes-docs}
      # DocLayout-YOLO sidecar — ดึง bbox กราฟ หน้า dashboard ที่ heuristic แยกไม่ได้
      # เปิดใช้: ตั้ง DOC_IMG_USE_DOCLING=1 ใน .env (ค่าเริ่มต้น 0 = heuristic เดิม ไม่ regression)
      # หน้าที่ YOLO ไม่เจอกราฟ (vision/infographic/portrait) → backend fallback heuristic รายหน้า
      DOC_IMG_USE_DOCLING: ${DOC_IMG_USE_DOCLING:-0}
      DOC_IMG_DOCLING_URL: http://doclayout:8000/figures
      DOC_IMG_DOCLING_MAX_PAGES: ${DOC_IMG_DOCLING_MAX_PAGES:-60}
      # PDF→Markdown provider: ว่าง=pymupdf4llm+cleanup+vision (เดิม), mistral=Mistral OCR API
      # (hosted, คุณภาพสูง extractive, ไม่กิน RAM/CPU — เหมาะ VPS CPU เล็ก) ใช้เฉพาะ bg conversion
      PDF_MD_PROVIDER: ${PDF_MD_PROVIDER:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./backend/uploads:/app/backend/uploads
    ports:
      - "8000:8000"
    networks:
      - hermes_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO - object storage สำหรับรูปที่ extract จาก PDF (ภายใน network เท่านั้น)
  minio:
    image: minio/minio:latest
    container_name: hermes_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hermes_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_secret}
    volumes:
      - minio_data:/data
    # console เปิด public (มีรหัส root กัน) เข้าตรง http://<ip>:9001 — API เก็บ localhost
    ports:
      - "9001:9001"             # web console (public)
      - "127.0.0.1:9000:9000"   # S3 API (ภายในเท่านั้น)
    networks:
      - hermes_network
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx - Reverse Proxy & Frontend
  nginx:
    image: nginx:alpine
    container_name: hermes_nginx
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./app.html:/usr/share/nginx/html/app.html:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./logo:/usr/share/nginx/html/logo:ro
      - nginx_logs:/var/log/nginx
    networks:
      - hermes_network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/app.html"]
      interval: 30s
      timeout: 10s
      retries: 3

  # n8n Workflow Automation - Optional
  n8n:
    image: n8nio/n8n:latest
    container_name: hermes_n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-change_me}
      - N8N_HOST=${DOMAIN_NAME}
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=Asia/Bangkok
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=${DB_USER:-hermes_user}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-change_me_in_production}
      - DB_POSTGRESDB_DATABASE=n8n_db
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - hermes_network
    restart: always
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and queue
  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change_me}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hermes_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DocLayout-YOLO sidecar - layout model ดึง bbox รูป/กราฟ/ตาราง (ฟีเจอร์ "รูปที่เกี่ยวข้อง")
  # backend POST PDF (multipart) ผ่าน hermes_network → คืน bbox; ไม่เปิด port public
  # หนัก (torch) แต่ idle เกือบตลอด (สไปก์เฉพาะตอน index เอกสารใหม่) → จำกัด RAM กัน OOM ทั้ง VPS
  doclayout:
    build:
      context: ./tools/docling
      dockerfile: Dockerfile
    container_name: hermes_doclayout
    networks:
      - hermes_network
    restart: always
    mem_limit: 3g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

networks:
  hermes_network:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  redis_data:
  nginx_logs:
  minio_data:
